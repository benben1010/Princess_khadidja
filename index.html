<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Find Your Name in the Stars ✨</title>

  <style>
    :root{
      --bg1:#07081a;
      --bg2:#120a2a;
      --pink:#ff4fa3;
      --pink2:#ff8acb;
      --cyan:#7de3ff;
      --card: rgba(20, 14, 44, .78);
      --stroke: rgba(255,255,255,.14);
      --text:#f7f5ff;
      --muted: rgba(247,245,255,.72);
      --shadow: 0 18px 70px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      overflow:hidden;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 25% 10%, rgba(255,79,163,.14) 0%, rgba(255,79,163,0) 60%),
        radial-gradient(900px 600px at 80% 70%, rgba(125,227,255,.10) 0%, rgba(125,227,255,0) 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    canvas#sky{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .ui{
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, calc(100% - 24px));
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 10;
      pointer-events:none;
    }

    .panel{
      pointer-events:auto;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(10, 8, 26, .35);
      backdrop-filter: blur(12px);
      border: 1px solid var(--stroke);
      box-shadow: 0 10px 40px rgba(0,0,0,.25);
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 0;
    }

    .brandDot{
      width: 10px; height: 10px; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff, var(--pink));
      box-shadow: 0 0 18px rgba(255,79,163,.9);
      flex: 0 0 auto;
    }

    .titleWrap{ min-width: 0; }
    .title{
      margin:0;
      font-size: 14px;
      font-weight: 900;
      letter-spacing:.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub{
      margin:2px 0 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill{
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      color: rgba(247,245,255,.85);
      white-space: nowrap;
    }

    .controls{
      pointer-events:auto;
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn{
      border: 1px solid var(--stroke);
      background: rgba(10, 8, 26, .35);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
      box-shadow: 0 10px 40px rgba(0,0,0,.22);
      font-weight: 900;
      font-size: 12.5px;
      user-select: none;
    }
    .btn:hover{
      border-color: rgba(255,79,163,.45);
      background: rgba(10, 8, 26, .55);
      transform: translateY(-1px);
    }
    .btn:active{ transform: translateY(0); }
    .btn.primary{ border-color: rgba(255,79,163,.5); }

    /* Bottom message card */
    .card{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(920px, calc(100% - 24px));
      padding: 14px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 10;
    }
    .card.hidden{ display:none; }

    .msg{
      display:flex;
      align-items:flex-start;
      gap: 12px;
      min-width: 0;
    }
    .badge{
      width: 40px; height: 40px;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.92), rgba(255,79,163,.78));
      box-shadow: 0 0 24px rgba(255,79,163,.35);
      display:grid;
      place-items:center;
      font-size: 18px;
      flex: 0 0 auto;
    }
    .msgText{ min-width: 0; }
    .msgText .label{
      margin:0;
      font-size: 12px;
      letter-spacing:.35px;
      text-transform: uppercase;
      color: rgba(247,245,255,.7);
    }
    .msgText .body{
      margin: 4px 0 0 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
      word-wrap: break-word;
    }
    .msgText .meta{
      margin-top: 6px;
      font-size: 12px;
      color: rgba(247,245,255,.75);
    }

    .bigLetter{
      font-size: 16px;
      font-weight: 950;
      color: rgba(255,255,255,.92);
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,79,163,.35);
      background: rgba(255,79,163,.12);
      white-space: nowrap;
    }

    .centerHint{
      position: fixed;
      inset: 0;
      display:grid;
      place-items: center;
      z-index: 5;
      pointer-events:none;
      padding: 24px;
      text-align:center;
    }
    .centerHint .bubble{
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10, 8, 26, .25);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,.25);
      color: rgba(247,245,255,.82);
      font-size: 13px;
    }

    /* Win overlay */
    .win{
      position: fixed;
      inset: 0;
      display:none;
      place-items:center;
      z-index: 30;
      background: radial-gradient(900px 600px at 50% 40%, rgba(255,79,163,.22), rgba(0,0,0,.58));
      backdrop-filter: blur(6px);
      padding: 24px;
      text-align:center;
    }
    .win.show{ display:grid; }

    .winBox{
      width: min(760px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(10, 8, 26, .55);
      box-shadow: 0 18px 80px rgba(0,0,0,.55);
      padding: 22px;
    }
    .winBox h2{
      margin: 0;
      font-size: 22px;
      letter-spacing: .2px;
      font-weight: 950;
    }
    .winBox .name{
      margin-top: 14px;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: 2px;
      color: rgba(255,255,255,.95);
      text-shadow: 0 0 22px rgba(255,79,163,.35);
    }

    /* Cute heart bounce under the final message */
    .heartRow{
      margin-top: 12px;
      font-size: 20px;
      user-select:none;
    }
    .heartRow span{
      display:inline-block;
      animation: pop 1.2s ease-in-out infinite;
    }
    .heartRow span:nth-child(2){ animation-delay: .15s; }
    .heartRow span:nth-child(3){ animation-delay: .30s; }
    .heartRow span:nth-child(4){ animation-delay: .45s; }
    .heartRow span:nth-child(5){ animation-delay: .60s; }

    @keyframes pop{
      0%, 100% { transform: translateY(0) scale(1); opacity:.9; }
      50% { transform: translateY(-6px) scale(1.16); opacity:1; }
    }

    @media (max-width: 620px){
      .sub{ display:none; }
      .bigLetter{ display:none; }
    }
  </style>
</head>

<body>
  <canvas id="sky"></canvas>

  <div class="ui">
    <div class="panel" style="min-width:min(560px, 100%);">
      <div class="brandDot"></div>
      <div class="titleWrap">
        <p class="title" id="uiTitle">Find the stars to complete your name 💗</p>
        <p class="sub" id="uiSub">Some stars hide letters… and the pink hearts are included.</p>
      </div>
      <div class="pill" id="foundCount">0/0</div>
    </div>

    <div class="controls">
      <button class="btn" id="hintBtn">Hint</button>
      <button class="btn" id="shuffleBtn">Shuffle</button>
      <button class="btn primary" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="centerHint" id="centerHint">
    <div class="bubble" id="centerBubble">Tap a star to start ✨</div>
  </div>

  <div class="card hidden" id="card" role="status" aria-live="polite">
    <div class="msg">
      <div class="badge" id="badge">💌</div>
      <div class="msgText">
        <p class="label" id="cardLabel">Message</p>
        <p class="body" id="cardBody"></p>
        <div class="meta" id="cardMeta"></div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="bigLetter" id="letterPill">Letter: —</div>
      <button class="btn" id="closeBtn">Close</button>
    </div>
  </div>

  <div class="win" id="win">
    <div class="winBox">
      <h2>You completed it ✨</h2>
      <div class="name" id="winName"></div>

      <div id="winText" style="margin-top: 10px;"></div>

      <div style="margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn primary" id="playAgainBtn">Play again</button>
        <button class="btn" id="closeWinBtn">Close</button>
      </div>
    </div>
  </div>

<script>
(() => {
  // =======================
  // PERSONAL SETTINGS
  // =======================
  const DISPLAY_NAME = "Khadidja";
  const TARGET_NAME  = "KHADIDJA";
  const SIGNATURE    = ""; // optional: "— Hicham"
  const FINAL_TEXT   = "Khadidja you are an angel from heaven, will you be my princesse ?";

  // =======================
  // CANVAS SETUP
  // =======================
  const canvas = document.getElementById("sky");
  const ctx = canvas.getContext("2d", { alpha: true });

  let W=0, H=0, DPR=1;
  function resize(){
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W*DPR);
    canvas.height = Math.floor(H*DPR);
    canvas.style.width = W+"px";
    canvas.style.height = H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  // =======================
  // UI ELEMENTS
  // =======================
  const uiTitle = document.getElementById("uiTitle");
  const uiSub = document.getElementById("uiSub");
  const centerBubble = document.getElementById("centerBubble");

  const centerHint = document.getElementById("centerHint");
  const foundCount = document.getElementById("foundCount");

  const card = document.getElementById("card");
  const badge = document.getElementById("badge");
  const cardLabel = document.getElementById("cardLabel");
  const cardBody = document.getElementById("cardBody");
  const cardMeta = document.getElementById("cardMeta");
  const letterPill = document.getElementById("letterPill");
  const closeBtn = document.getElementById("closeBtn");

  const hintBtn = document.getElementById("hintBtn");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetBtn = document.getElementById("resetBtn");

  const win = document.getElementById("win");
  const winName = document.getElementById("winName");
  const winText = document.getElementById("winText");
  const playAgainBtn = document.getElementById("playAgainBtn");
  const closeWinBtn = document.getElementById("closeWinBtn");

  uiTitle.textContent = `Find the stars to complete your name, ${DISPLAY_NAME} 💗`;
  uiSub.textContent = "Some stars hide letters… and the pink hearts are included.";
  centerBubble.textContent = `Tap a star to start ✨ (there are ${TARGET_NAME.length} hidden letters)`;

  // =======================
  // TYPEWRITER EFFECT
  // =======================
  let typingId = 0; // cancels previous typing when new text appears

  function typewriter(el, text, options = {}) {
    const {
      speed = 22,          // ms per character
      startDelay = 0,      // ms
      cursor = false,      // show cursor
      onDone = null
    } = options;

    const myId = ++typingId;
    el.textContent = "";
    el.dataset.fullText = text; // for skip
    el.dataset.typing = "1";

    let i = 0;
    let cursorEl = null;

    if (cursor) {
      cursorEl = document.createElement("span");
      cursorEl.textContent = "▍";
      cursorEl.style.opacity = "0.85";
      cursorEl.style.marginLeft = "2px";
      cursorEl.style.color = "rgba(255,79,163,.9)";
      cursorEl.style.animation = "blink 1s step-end infinite";
      el.appendChild(cursorEl);
    }

    const start = () => {
      const tick = () => {
        if (myId !== typingId) return; // cancelled

        // If user skipped
        if (el.dataset.typing === "0") {
          finish();
          return;
        }

        if (i >= text.length) {
          finish();
          return;
        }

        // insert next char before cursor
        const ch = text[i++];
        if (cursorEl) {
          cursorEl.insertAdjacentText("beforebegin", ch);
        } else {
          el.textContent += ch;
        }
        setTimeout(tick, speed);
      };

      tick();
    };

    const finish = () => {
      if (myId !== typingId) return;
      el.dataset.typing = "0";
      if (cursorEl) {
        // rebuild clean text (without cursor)
        el.textContent = text;
      } else {
        el.textContent = text;
      }
      if (typeof onDone === "function") onDone();
    };

    if (startDelay > 0) setTimeout(() => { if (myId === typingId) start(); }, startDelay);
    else start();

    // return a skip function
    return () => {
      if (myId !== typingId) return;
      el.dataset.typing = "0";
    };
  }

  // Add blinking cursor keyframes (injected)
  const style = document.createElement("style");
  style.textContent = `@keyframes blink{50%{opacity:0}}`;
  document.head.appendChild(style);

  // allow skip typing by tapping/clicking card
  function enableSkipOnCard(currentSkipFn){
    const handler = () => {
      if (currentSkipFn) currentSkipFn();
    };
    card.addEventListener("pointerdown", handler, { once: true });
  }

  // =======================
  // GAME STATE
  // =======================
  const targetLetters = TARGET_NAME.split("");
  const totalLetters = targetLetters.length;
  let found = new Array(totalLetters).fill(false);
  let foundTotal = 0;

  const config = {
    starCount: 72,
    maxLinkDist: 165,
    drift: 0.045,
    twinkleSpeed: 0.028
  };

  let stars = [];
  let hearts = [];
  let mouse = { x:-9999, y:-9999 };

  function rand(min,max){ return min + Math.random()*(max-min); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  // =======================
  // YOUR ROMANTIC "FOUND LETTER" MESSAGES (verbatim)
  // =======================
  const romanticCorrectMessages = [
    "Careful… every time you click a star my heart skips a beat 💗",
    "That was smooth… are you always this charming? 😌",
    "Another letter already? You're making this look too easy ✨",
    "I swear the stars shine brighter when you touch them 💫",
    "That click had style… I like that 👀",
    "You’re collecting letters, but somehow you’re also stealing my attention 💗",
    "If confidence had a constellation… it would look like you ✨",
    "I think the stars like you… honestly, so do I 😌",
    "Every letter you find makes this sky a little more magical 💖",
    "Wow… you really know how to make a moment feel special 💞"
  ];

  const decoyMessages = [
    "Not a letter… but that click was cute 😌",
    "Wrong star. Right energy though 💗",
    "Okay detective… not this one 👀",
    "This star is just here to look pretty ✨",
    "No letter here… but I like your persistence 💞",
    "Close-ish. Try a brighter pink one 💖",
    "This one’s teasing you. Click another 😄",
    "Not a letter—still a good click though 💗",
    "Keep going… you’re making this fun.",
    "I believe in you. Next one is yours 🌙"
  ];

  function romanticProgressLine(ratio){
    if (ratio < 0.25) return "We just started… and you already look cute doing this 💗";
    if (ratio < 0.50) return "Okay… now you’re really pulling me in 😌✨";
    if (ratio < 0.75) return "Halfway there, and I’m officially impressed (and distracted) 💞";
    if (ratio < 1.00) return "You’re so close… don’t stop now 💗";
    return "Perfect. You + stars = a dangerous combo 😄💖";
  }

  // =======================
  // HEART PARTICLES
  // =======================
  function spawnHearts(x,y,amount=10){
    for(let i=0;i<amount;i++){
      hearts.push({
        x, y,
        vx: rand(-0.9, 0.9),
        vy: rand(-1.8, -0.6),
        life: rand(40, 70),
        size: rand(7, 12),
        rot: rand(0, Math.PI*2),
        vr: rand(-0.08, 0.08),
        alpha: 1
      });
    }
  }

  function drawHeart(x, y, size, alpha, rot){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;

    ctx.beginPath();
    const s = size;
    ctx.moveTo(0, s*0.35);
    ctx.bezierCurveTo(0, -s*0.2, -s*0.9, -s*0.2, -s*0.9, s*0.35);
    ctx.bezierCurveTo(-s*0.9, s*0.9, -s*0.2, s*1.1, 0, s*1.35);
    ctx.bezierCurveTo(s*0.2, s*1.1, s*0.9, s*0.9, s*0.9, s*0.35);
    ctx.bezierCurveTo(s*0.9, -s*0.2, 0, -s*0.2, 0, s*0.35);

    ctx.fillStyle = "rgba(255,79,163,0.95)";
    ctx.shadowColor = "rgba(255,79,163,0.55)";
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.restore();
  }

  // =======================
  // STAR + GAME LOGIC
  // =======================
  function updateProgressUI(){
    foundCount.textContent = `${foundTotal}/${totalLetters}`;
  }
  function isWin(){
    return foundTotal === totalLetters;
  }

  function makeStars(){
    stars = [];
    hearts = [];
    found = new Array(totalLetters).fill(false);
    foundTotal = 0;
    updateProgressUI();

    winName.textContent = TARGET_NAME;

    const slots = new Set();
    while(slots.size < totalLetters){
      slots.add(Math.floor(rand(0, config.starCount)));
    }
    const slotArr = [...slots];

    for(let i=0;i<config.starCount;i++){
      const isLetterStar = slotArr.includes(i);
      let letterInfo = null;

      if(isLetterStar){
        const pos = slotArr.indexOf(i);
        letterInfo = { pos, letter: targetLetters[pos] };
      }

      stars.push({
        id: i+1,
        x: rand(0, W),
        y: rand(0, H),
        r: isLetterStar ? rand(2.2, 3.2) : rand(1.2, 2.6),
        vx: rand(-config.drift, config.drift),
        vy: rand(-config.drift, config.drift),
        phase: rand(0, Math.PI*2),
        pulse: 0,
        isLetterStar,
        letter: letterInfo?.letter ?? "",
        pos: letterInfo?.pos ?? -1,
        revealed: false
      });
    }

    centerHint.style.opacity = "1";
    centerHint.style.transition = "opacity .25s ease";
  }

  function pickStar(px, py){
    let best=-1, bestD=1e9;
    for(let i=0;i<stars.length;i++){
      const s = stars[i];
      const d = Math.hypot(px-s.x, py-s.y);
      const hit = Math.max(12, s.r*7);
      if(d < hit && d < bestD){ best=i; bestD=d; }
    }
    return best;
  }

  // showCard now types the main message text
  function showCard({type, text, meta, letter}){
    badge.textContent = (type === "correct") ? "💗" : "✨";
    cardLabel.textContent = (type === "correct") ? "Letter found!" : "Star message";
    letterPill.textContent = letter ? `Letter: ${letter}` : "Letter: —";
    card.classList.remove("hidden");

    // reset meta while typing
    cardMeta.textContent = "";

    centerHint.style.opacity = "0";
    centerHint.style.transition = "opacity .35s ease";

    // type the body, then show meta
    const skip = typewriter(cardBody, text, {
      speed: 18,
      cursor: true,
      onDone: () => { cardMeta.textContent = meta || (SIGNATURE ? SIGNATURE : ""); }
    });

    enableSkipOnCard(skip);
  }

  // Win screen uses typing too
  function winSequence(){
    winText.innerHTML = `
      <div style="font-size:22px; font-weight:950; line-height:1.35;">
        <span style="color:#ff4fa3;">💗💖💞</span>
        <span id="finalLine"></span>
        <span style="color:#ff4fa3;">💞💖💗</span>
      </div>

      <div class="heartRow" id="heartRow" aria-hidden="true" style="display:none;">
        <span>💗</span><span>💖</span><span>💞</span><span>💗</span><span>💖</span>
      </div>

      <div id="sig" style="margin-top:10px; opacity:.85; display:none;"></div>
    `;

    win.classList.add("show");

    const finalLine = document.getElementById("finalLine");
    const heartRow = document.getElementById("heartRow");
    const sig = document.getElementById("sig");

    const skip = typewriter(finalLine, FINAL_TEXT, {
      speed: 22,
      cursor: true,
      onDone: () => {
        heartRow.style.display = "block";
        if (SIGNATURE) {
          sig.textContent = SIGNATURE;
          sig.style.display = "block";
        }
      }
    });

    // Tap win box to skip typing
    win.addEventListener("pointerdown", () => skip(), { once:true });

    // celebration hearts
    for(let k=0;k<22;k++){
      spawnHearts(rand(W*0.25, W*0.75), rand(H*0.35, H*0.7), 4);
    }
  }

  // =======================
  // ANIMATION LOOP
  // =======================
  let t=0;
  function step(){
    t += 1;
    ctx.clearRect(0,0,W,H);

    // move stars
    for(const s of stars){
      s.x += s.vx;
      s.y += s.vy;

      if(s.x < -20) s.x = W+20;
      if(s.x > W+20) s.x = -20;
      if(s.y < -20) s.y = H+20;
      if(s.y > H+20) s.y = -20;

      s.pulse *= 0.92;
      if(s.pulse < 0.001) s.pulse = 0;
    }

    // links
    ctx.save();
    ctx.lineWidth = 1;
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const a = stars[i], b = stars[j];
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if(d < config.maxLinkDist){
          const alpha = (1 - d/config.maxLinkDist) * 0.55;
          const boost = (a.isLetterStar || b.isLetterStar) ? 1.35 : 1;

          const r = 255;
          const g = (a.isLetterStar || b.isLetterStar) ? 120 : 227;
          const bb = (a.isLetterStar || b.isLetterStar) ? 190 : 255;

          ctx.strokeStyle = `rgba(${r},${g},${bb},${alpha * 0.28 * boost})`;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }
    ctx.restore();

    const hoverIndex = pickStar(mouse.x, mouse.y);

    // stars
    for(let i=0;i<stars.length;i++){
      const s = stars[i];
      const isHover = i===hoverIndex;

      const tw = (Math.sin(t*config.twinkleSpeed + s.phase)+1)/2;
      const glow = 0.35 + tw*0.65;

      const hoverBoost = isHover ? 1.4 : 1;
      const pulseBoost = 1 + s.pulse*1.8;

      const letterBoost = s.isLetterStar ? 1.32 : 1;
      const rr = s.r * hoverBoost * pulseBoost * letterBoost;

      ctx.save();

      const grd = ctx.createRadialGradient(s.x,s.y,0, s.x,s.y, rr*10);
      const glowColor = s.isLetterStar ? "255,79,163" : "255,255,255";
      const a1 = s.isLetterStar ? 0.36 : 0.22;
      grd.addColorStop(0, `rgba(255,255,255,${0.85*glow})`);
      grd.addColorStop(0.35, `rgba(${glowColor},${a1*glow})`);
      grd.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(s.x,s.y, rr*10, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = s.isLetterStar ? "rgba(255,236,246,.98)" : (isHover ? "rgba(255,255,255,.98)" : "rgba(247,245,255,.92)");
      ctx.beginPath();
      ctx.arc(s.x,s.y, rr, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "rgba(125,227,255,.35)";
      ctx.beginPath();
      ctx.arc(s.x-rr*0.25, s.y-rr*0.25, Math.max(0.6, rr*0.35), 0, Math.PI*2);
      ctx.fill();

      if(s.revealed){
        ctx.strokeStyle = "rgba(255,79,163,.40)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(s.x,s.y, rr*2.6, 0, Math.PI*2);
        ctx.stroke();
      }

      ctx.restore();
    }

    // hearts
    for(let i=hearts.length-1; i>=0; i--){
      const p = hearts[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02;
      p.rot += p.vr;
      p.life -= 1;
      p.alpha = Math.max(0, p.life / 70);

      drawHeart(p.x, p.y, p.size, p.alpha, p.rot);

      if(p.life <= 0) hearts.splice(i,1);
    }

    document.body.style.cursor = (hoverIndex !== -1) ? "pointer" : "default";
    requestAnimationFrame(step);
  }

  // =======================
  // INPUT
  // =======================
  function pointerPos(e){
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener("pointermove", (e) => {
    const p = pointerPos(e);
    mouse.x = p.x; mouse.y = p.y;
  });
  canvas.addEventListener("pointerleave", () => {
    mouse.x = -9999; mouse.y = -9999;
  });

  canvas.addEventListener("pointerdown", (e) => {
    if(win.classList.contains("show")) return;

    const p = pointerPos(e);
    const idx = pickStar(p.x, p.y);
    if(idx === -1) return;

    const s = stars[idx];
    s.pulse = 1;

    const ratioBefore = foundTotal / totalLetters;

    if(s.isLetterStar){
      if(found[s.pos]){
        showCard({
          type: "correct",
          text: `You already found “${s.letter}” 💗 (and you’re still cute for trying 😌)`,
          meta: "Try another star… I’m enjoying watching you win ✨",
          letter: s.letter
        });
        spawnHearts(s.x, s.y, 6);
        return;
      }

      found[s.pos] = true;
      foundTotal++;
      s.revealed = true;
      updateProgressUI();

      const ratio = foundTotal / totalLetters;

      showCard({
        type: "correct",
        text: `You found “${s.letter}” 💗  ${pick(romanticCorrectMessages)}`,
        meta: `${romanticProgressLine(ratio)}  (Pink hearts for you 💗)${SIGNATURE ? " " + SIGNATURE : ""}`,
        letter: s.letter
      });

      spawnHearts(s.x, s.y, 14);

      if(isWin()){
        setTimeout(winSequence, 450);
      }
    } else {
      showCard({
        type: "decoy",
        text: pick(decoyMessages),
        meta: `${romanticProgressLine(ratioBefore)}  Tip: letter stars glow a little more pink 👀`,
        letter: ""
      });
    }
  });

  // Buttons
  closeBtn.addEventListener("click", () => card.classList.add("hidden"));

  hintBtn.addEventListener("click", () => {
    showCard({
      type: "decoy",
      text: "Hint time: the letter stars are a little more pink 💗",
      meta: "Try the brighter ones… they’re basically flirting back 😌✨",
      letter: ""
    });
    spawnHearts(W*0.5, H*0.65, 10);
  });

  shuffleBtn.addEventListener("click", () => {
    makeStars();
    card.classList.add("hidden");
  });

  resetBtn.addEventListener("click", () => {
    makeStars();
    card.classList.add("hidden");
    win.classList.remove("show");
  });

  playAgainBtn.addEventListener("click", () => {
    win.classList.remove("show");
    makeStars();
    card.classList.add("hidden");
  });

  closeWinBtn.addEventListener("click", () => {
    win.classList.remove("show");
  });

  // Init
  resize();
  makeStars();
  updateProgressUI();
  requestAnimationFrame(step);
  window.addEventListener("resize", () => {
    resize();
    makeStars();
    updateProgressUI();
  });
})();
</script>
